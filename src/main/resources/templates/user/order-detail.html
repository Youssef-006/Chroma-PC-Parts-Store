<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Chroma — Order Detail</title>
  <link rel="icon" href="/images/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  
  <link rel="stylesheet" th:href="@{/css/user/order-detail.css}"/>
</head>
<body>
<nav>
  <a href="/home" class="nav-brand">Chrom<em>a</em></a>
  <div class="nav-links">
    <a th:href="@{/home}">Home</a>
    <a th:href="@{/product}">Store</a>
    <a th:href="@{/orders}">My Orders</a>
    <a th:href="@{/cart}">Cart</a>
    <form th:action="@{/logout}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit">Logout</button>
    </form>
  </div>
</nav>

<div class="container">
  <a th:href="@{/orders}" class="back">← Back to My Orders</a>
  <h1 class="page-title" th:text="'Order #' + ${order.id}"></h1>

  <div class="grid">
    <div>
      <div class="card">
        <h2>Items</h2>
        <table>
          <thead>
            <tr><th>Product</th><th>Unit Price</th><th>Qty</th><th>Total</th></tr>
          </thead>
          <tbody>
            <tr th:each="item : ${order.items}">
              <td th:text="${item.productName}"></td>
              <td th:text="'EGP ' + ${#numbers.formatDecimal(item.unitPrice,1,0)}"></td>
              <td th:text="${item.quantity}"></td>
              <td th:text="'EGP ' + ${#numbers.formatDecimal(item.lineTotal,1,0)}"></td>
            </tr>
            <tr class="total-row">
              <td colspan="3" style="text-align:right;">Order Total</td>
              <td th:text="'EGP ' + ${#numbers.formatDecimal(order.total,1,0)}"></td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="card">
        <h2>Delivery Info</h2>
        <div class="info-row"><span class="info-label">Address</span><span th:text="${order.address}"></span></div>
        <div class="info-row"><span class="info-label">City</span><span th:text="${order.city}"></span></div>
        <div class="info-row"><span class="info-label">Governorate</span><span th:text="${order.governorate}"></span></div>
        <div class="info-row"><span class="info-label">Phone</span><span th:text="${order.phone}"></span></div>
        <div class="info-row"><span class="info-label">Leave at Door</span><span th:text="${order.leaveAtDoor} ? 'Yes' : 'No'"></span></div>
        <div class="info-row"><span class="info-label">Payment</span><span th:text="${order.paymentMethod}"></span></div>
      </div>
    </div>

    <div>
      <div class="card">
        <h2>Order Status</h2>
        <span class="badge"
              th:classappend="'badge-' + ${order.status.toLowerCase()}"
              th:text="${order.status}"></span>
        <p class="status-note">
          Placed on <span th:text="${#temporals.format(order.placedAt,'dd MMM yyyy')}"></span>.
          You will receive an email when your order ships.
        </p>
      </div>
    </div>
  </div>
</div>
</body>
</html>
