<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Chroma — Order Detail</title>
  <link rel="icon" href="/images/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --ink:    #0e0e0e;
      --paper:  #f5f2ec;
      --accent: #0079b5;
      --muted:  #888070;
      --border: #d4cfc6;
      --field:  #ffffff;
      --success:#2e7d32;
    }
    body { font-family:'DM Mono',monospace; background:var(--paper); color:var(--ink); min-height:100vh; }
    nav { background:var(--ink); color:#fff; display:flex; align-items:center; justify-content:space-between; padding:0 2.5rem; height:56px; }
    .nav-brand { font-family:'Cormorant Garamond',serif; font-size:1.5rem; font-weight:300; letter-spacing:0.2em; color:#fff; text-decoration:none; }
    .nav-brand em { color:var(--accent); font-style:normal; }
    .nav-links { display:flex; align-items:center; gap:2rem; }
    .nav-links a { font-size:0.65rem; letter-spacing:0.2em; text-transform:uppercase; color:rgba(255,255,255,0.6); text-decoration:none; }
    .nav-links a:hover { color:#fff; }
    .nav-links form button { background:none; border:none; cursor:pointer; font-size:0.65rem; letter-spacing:0.2em; text-transform:uppercase; color:rgba(255,255,255,0.6); font-family:'DM Mono',monospace; padding:0; }
    .container { max-width:900px; margin:3rem auto; padding:0 2rem; }
    .back { font-size:0.65rem; color:var(--muted); text-decoration:none; letter-spacing:0.1em; display:inline-block; margin-bottom:1.5rem; }
    .back:hover { color:var(--ink); }
    .page-title { font-family:'Cormorant Garamond',serif; font-size:2rem; font-weight:400; margin-bottom:2rem; }
    .grid { display:grid; grid-template-columns:1fr 280px; gap:1.5rem; align-items:start; }
    .card { background:#fff; border:1px solid var(--border); padding:1.5rem; margin-bottom:1.5rem; }
    .card h2 { font-family:'Cormorant Garamond',serif; font-size:1.2rem; font-weight:400; margin-bottom:1rem; padding-bottom:0.5rem; border-bottom:1px solid var(--border); }
    table { width:100%; border-collapse:collapse; font-size:0.72rem; }
    th { background:var(--ink); color:#fff; padding:0.6rem 0.8rem; text-align:left; font-size:0.58rem; letter-spacing:0.15em; text-transform:uppercase; font-weight:400; }
    td { padding:0.65rem 0.8rem; border-bottom:1px solid var(--border); }
    tr:last-child td { border-bottom:none; }
    .total-row td { font-weight:bold; background:#faf9f6; }
    .info-row { display:flex; justify-content:space-between; padding:0.4rem 0; font-size:0.72rem; border-bottom:1px solid #f0ede8; }
    .info-row:last-child { border-bottom:none; }
    .info-label { color:var(--muted); }
    .badge { display:inline-block; padding:0.3rem 0.8rem; font-size:0.65rem; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:0.5rem; }
    .badge-pending    { background:#fff3cd; color:#856404; }
    .badge-processing { background:#cfe2ff; color:#0a58ca; }
    .badge-shipped    { background:#d1ecf1; color:#0c5460; }
    .badge-delivered  { background:#d4edda; color:#155724; }
    .badge-cancelled  { background:#f8d7da; color:#721c24; }
    .status-note { font-size:0.65rem; color:var(--muted); margin-top:0.5rem; }
  </style>
</head>
<body>
<nav>
  <a href="/home" class="nav-brand">Chrom<em>a</em></a>
  <div class="nav-links">
    <a th:href="@{/home}">Home</a>
    <a th:href="@{/product}">Store</a>
    <a th:href="@{/orders}">My Orders</a>
    <a th:href="@{/cart}">Cart</a>
    <form th:action="@{/logout}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit">Logout</button>
    </form>
  </div>
</nav>

<div class="container">
  <a th:href="@{/orders}" class="back">← Back to My Orders</a>
  <h1 class="page-title" th:text="'Order #' + ${order.id}"></h1>

  <div class="grid">
    <div>
      <div class="card">
        <h2>Items</h2>
        <table>
          <thead>
            <tr><th>Product</th><th>Unit Price</th><th>Qty</th><th>Total</th></tr>
          </thead>
          <tbody>
            <tr th:each="item : ${order.items}">
              <td th:text="${item.productName}"></td>
              <td th:text="'EGP ' + ${#numbers.formatDecimal(item.unitPrice,1,0)}"></td>
              <td th:text="${item.quantity}"></td>
              <td th:text="'EGP ' + ${#numbers.formatDecimal(item.lineTotal,1,0)}"></td>
            </tr>
            <tr class="total-row">
              <td colspan="3" style="text-align:right;">Order Total</td>
              <td th:text="'EGP ' + ${#numbers.formatDecimal(order.total,1,0)}"></td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="card">
        <h2>Delivery Info</h2>
        <div class="info-row"><span class="info-label">Address</span><span th:text="${order.address}"></span></div>
        <div class="info-row"><span class="info-label">City</span><span th:text="${order.city}"></span></div>
        <div class="info-row"><span class="info-label">Governorate</span><span th:text="${order.governorate}"></span></div>
        <div class="info-row"><span class="info-label">Phone</span><span th:text="${order.phone}"></span></div>
        <div class="info-row"><span class="info-label">Leave at Door</span><span th:text="${order.leaveAtDoor} ? 'Yes' : 'No'"></span></div>
        <div class="info-row"><span class="info-label">Payment</span><span th:text="${order.paymentMethod}"></span></div>
      </div>
    </div>

    <div>
      <div class="card">
        <h2>Order Status</h2>
        <span class="badge"
              th:classappend="'badge-' + ${order.status.toLowerCase()}"
              th:text="${order.status}"></span>
        <p class="status-note">
          Placed on <span th:text="${#temporals.format(order.placedAt,'dd MMM yyyy')}"></span>.
          You will receive an email when your order ships.
        </p>
      </div>
    </div>
  </div>
</div>
</body>
</html>
