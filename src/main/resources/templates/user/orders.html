<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chroma — My Orders</title>
  <link rel="icon" href="/images/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  
  <link rel="stylesheet" th:href="@{/css/user/orders.css}"/>
</head>
<body>
<nav>
  <a href="/home" class="nav-brand">Chrom<em>a</em></a>
  <div class="nav-links">
    <a th:href="@{/home}">Home</a>
    <a th:href="@{/product}">Store</a>
    <a th:href="@{/orders}" style="color:#fff;">My Orders</a>
    <a th:href="@{/cart}">Cart</a>
    <form th:action="@{/logout}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit">Logout</button>
    </form>
  </div>
</nav>

<div class="container">
  <div class="page-eyebrow">Account</div>
  <h1 class="page-title">My Orders</h1>

  <div th:if="${#lists.isEmpty(orders)}" class="empty">
    <p>No orders yet.</p>
    <a th:href="@{/product}" class="btn">Browse the Store</a>
  </div>

  <div th:each="o : ${orders}" class="order-card">
    <div class="order-header">
      <div>
        <div class="order-num" th:text="'Order #' + ${o.id}"></div>
        <div class="order-date" th:text="${#temporals.format(o.placedAt,'dd MMM yyyy, HH:mm')}"></div>
      </div>
      <span class="badge"
            th:classappend="'badge-' + ${o.status.toLowerCase()}"
            th:text="${o.status}"></span>
    </div>
    <div class="order-body">
      <div class="order-items-preview">
        <span th:text="${o.items.size()}"></span> item(s) —
        <span th:each="item,iter : ${o.items}" th:text="${item.productName + (iter.last ? '' : ', ')}"></span>
      </div>
      <div class="order-total" th:text="'EGP ' + ${#numbers.formatDecimal(o.total,1,0)}"></div>
    </div>
    <div class="order-footer">
      <span style="font-size:0.65rem;color:var(--muted);"
            th:text="${o.city + ', ' + o.governorate}"></span>
      <a class="btn" th:href="@{/orders/{id}(id=${o.id})}">View Details →</a>
    </div>
  </div>
</div>
</body>
</html>
