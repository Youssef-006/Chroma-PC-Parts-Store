<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chroma — My Orders</title>
  <link rel="icon" href="/images/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --ink:    #0e0e0e;
      --paper:  #f5f2ec;
      --accent: #0079b5;
      --muted:  #888070;
      --border: #d4cfc6;
      --field:  #ffffff;
      --success:#2e7d32;
    }
    body { font-family:'DM Mono',monospace; background:var(--paper); color:var(--ink); min-height:100vh; }

    nav { background:var(--ink); color:#fff; display:flex; align-items:center; justify-content:space-between; padding:0 2.5rem; height:56px; }
    .nav-brand { font-family:'Cormorant Garamond',serif; font-size:1.5rem; font-weight:300; letter-spacing:0.2em; color:#fff; text-decoration:none; }
    .nav-brand em { color:var(--accent); font-style:normal; }
    .nav-links { display:flex; align-items:center; gap:2rem; }
    .nav-links a { font-size:0.65rem; letter-spacing:0.2em; text-transform:uppercase; color:rgba(255,255,255,0.6); text-decoration:none; }
    .nav-links a:hover { color:#fff; }
    .nav-links form button { background:none; border:none; cursor:pointer; font-size:0.65rem; letter-spacing:0.2em; text-transform:uppercase; color:rgba(255,255,255,0.6); font-family:'DM Mono',monospace; padding:0; }
    .nav-links form button:hover { color:var(--accent); }

    .container { max-width:900px; margin:3rem auto; padding:0 2rem; }
    .page-eyebrow { font-size:0.6rem; letter-spacing:0.25em; color:var(--accent); text-transform:uppercase; margin-bottom:0.4rem; }
    .page-title { font-family:'Cormorant Garamond',serif; font-size:2.4rem; font-weight:400; margin-bottom:2rem; }

    .order-card { background:#fff; border:1px solid var(--border); margin-bottom:1.2rem; }
    .order-header { display:flex; justify-content:space-between; align-items:center; padding:1rem 1.5rem; border-bottom:1px solid var(--border); flex-wrap:wrap; gap:0.5rem; }
    .order-num { font-size:0.85rem; font-weight:bold; }
    .order-date { font-size:0.65rem; color:var(--muted); }
    .order-body { padding:1rem 1.5rem; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem; }
    .order-items-preview { font-size:0.7rem; color:var(--muted); }
    .order-items-preview span { color:var(--ink); }
    .order-total { font-family:'Cormorant Garamond',serif; font-size:1.4rem; }
    .order-footer { padding:0.75rem 1.5rem; background:#faf9f6; display:flex; justify-content:space-between; align-items:center; border-top:1px solid var(--border); }

    .badge { display:inline-block; padding:0.2rem 0.7rem; font-size:0.6rem; letter-spacing:0.1em; text-transform:uppercase; }
    .badge-pending    { background:#fff3cd; color:#856404; }
    .badge-processing { background:#cfe2ff; color:#0a58ca; }
    .badge-shipped    { background:#d1ecf1; color:#0c5460; }
    .badge-delivered  { background:#d4edda; color:#155724; }
    .badge-cancelled  { background:#f8d7da; color:#721c24; }

    .btn { display:inline-block; padding:0.4rem 0.9rem; font-family:'DM Mono',monospace; font-size:0.62rem; letter-spacing:0.12em; text-transform:uppercase; border:1px solid var(--ink); color:var(--ink); text-decoration:none; transition:all 0.2s; }
    .btn:hover { background:var(--ink); color:#fff; }

    .empty { text-align:center; padding:4rem 2rem; }
    .empty p { font-family:'Cormorant Garamond',serif; font-size:1.8rem; color:var(--muted); font-style:italic; margin-bottom:1rem; }
  </style>
</head>
<body>
<nav>
  <a href="/home" class="nav-brand">Chrom<em>a</em></a>
  <div class="nav-links">
    <a th:href="@{/home}">Home</a>
    <a th:href="@{/product}">Store</a>
    <a th:href="@{/orders}" style="color:#fff;">My Orders</a>
    <a th:href="@{/cart}">Cart</a>
    <form th:action="@{/logout}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit">Logout</button>
    </form>
  </div>
</nav>

<div class="container">
  <div class="page-eyebrow">Account</div>
  <h1 class="page-title">My Orders</h1>

  <div th:if="${#lists.isEmpty(orders)}" class="empty">
    <p>No orders yet.</p>
    <a th:href="@{/product}" class="btn">Browse the Store</a>
  </div>

  <div th:each="o : ${orders}" class="order-card">
    <div class="order-header">
      <div>
        <div class="order-num" th:text="'Order #' + ${o.id}"></div>
        <div class="order-date" th:text="${#temporals.format(o.placedAt,'dd MMM yyyy, HH:mm')}"></div>
      </div>
      <span class="badge"
            th:classappend="'badge-' + ${o.status.toLowerCase()}"
            th:text="${o.status}"></span>
    </div>
    <div class="order-body">
      <div class="order-items-preview">
        <span th:text="${o.items.size()}"></span> item(s) —
        <span th:each="item,iter : ${o.items}" th:text="${item.productName + (iter.last ? '' : ', ')}"></span>
      </div>
      <div class="order-total" th:text="'EGP ' + ${#numbers.formatDecimal(o.total,1,0)}"></div>
    </div>
    <div class="order-footer">
      <span style="font-size:0.65rem;color:var(--muted);"
            th:text="${o.city + ', ' + o.governorate}"></span>
      <a class="btn" th:href="@{/orders/{id}(id=${o.id})}">View Details →</a>
    </div>
  </div>
</div>
</body>
</html>
