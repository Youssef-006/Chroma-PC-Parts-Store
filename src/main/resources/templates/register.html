<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Chroma — Create Account</title>
    <link rel="icon" href="/images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
    
  <link rel="stylesheet" th:href="@{/css/register.css}"/>
</head>
<body>

<div class="panel-left">
    <div class="brand">
        <div class="brand-name">Chroma</div>
        <div class="brand-tag"></div>
    </div>

    <div class="panel-art">
        <div class="circles-wrap">
            <div class="circle c1"></div>
            <div class="circle c2"></div>
            <div class="circle c3"></div>
            <div class="circle c4"></div>
        </div>
    </div>

    <div class="panel-quote">
        <p></p>
        <span>— Rachel Zoe</span>
    </div>
</div>

<div class="panel-right">
    <div class="form-header">
        <div class="form-eyebrow">New here?</div>
        <h1 class="form-title">Create your<br/>account.</h1>
    </div>

    <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

    <form th:action="@{/register}" th:object="${registerDTO}" method="post" novalidate>

        <!-- First Name -->
        <div class="field">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName"
                   th:field="*{firstName}"
                   th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'"
                   placeholder="Jane"
                   autocomplete="given-name"/>
            <div class="field-error" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
        </div>

        <!-- Last Name -->
        <div class="field">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName"
                   th:field="*{lastName}"
                   th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'"
                   placeholder="Doe"
                   autocomplete="family-name"/>
            <div class="field-error" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
        </div>

        <!-- Email -->
        <div class="field">
            <label for="email">Email Address</label>
            <input type="email" id="email"
                   th:field="*{email}"
                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                   placeholder="jane@example.com"
                   autocomplete="email"/>
            <div class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>

        <!-- Password -->
        <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password"
                   th:field="*{password}"
                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                   placeholder="Min. 8 characters"
                   autocomplete="new-password"/>
            <div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
        </div>

        <button type="submit" class="btn-submit"><span>Create Account →</span></button>
    </form>

    <div class="divider"><span>or</span></div>

    <div class="form-footer">
        Already have an account? <a th:href="@{/login}">Sign in</a>
    </div>
</div>

</body>
</html>
