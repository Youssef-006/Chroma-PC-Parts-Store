<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Chroma — Create Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ink:     #0e0e0e;
            --paper:   #f5f2ec;
            --accent:  #c0392b;
            --muted:   #888070;
            --border:  #d4cfc6;
            --field:   #ffffff;
        }

        body {
            min-height: 100vh;
            background-color: var(--paper);
            font-family: 'DM Mono', monospace;
            display: grid;
            grid-template-columns: 1fr 1fr;
            color: var(--ink);
            overflow: hidden;
        }

        .panel-left {
            position: relative;
            background: var(--ink);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 3rem;
            overflow: hidden;
        }

        .panel-left::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                    repeating-linear-gradient(
                            0deg,
                            transparent,
                            transparent 59px,
                            rgba(255,255,255,0.04) 59px,
                            rgba(255,255,255,0.04) 60px
                    ),
                    repeating-linear-gradient(
                            90deg,
                            transparent,
                            transparent 59px,
                            rgba(255,255,255,0.04) 59px,
                            rgba(255,255,255,0.04) 60px
                    );
        }

        .brand { position: relative; z-index: 1; }

        .brand-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-weight: 300;
            color: #fff;
            letter-spacing: 0.25em;
            text-transform: uppercase;
        }

        .brand-tag {
            font-size: 0.65rem;
            color: var(--muted);
            letter-spacing: 0.2em;
            margin-top: 0.4rem;
        }

        .panel-art {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .circles-wrap {
            position: relative;
            width: 260px;
            height: 260px;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.12);
            animation: spin linear infinite;
        }
        .c1 { inset: 0; animation-duration: 18s; }
        .c2 { inset: 24px; animation-duration: 13s; animation-direction: reverse; border-color: rgba(192,57,43,0.4); }
        .c3 { inset: 52px; animation-duration: 22s; }
        .c4 { inset: 80px; animation-duration: 10s; animation-direction: reverse; border-color: rgba(192,57,43,0.6); }

        .circle::after {
            content: '';
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent);
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .panel-quote {
            position: relative;
            z-index: 1;
        }

        .panel-quote p {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4rem;
            font-weight: 300;
            color: rgba(255,255,255,0.7);
            line-height: 1.6;
            font-style: italic;
        }

        .panel-quote span {
            display: block;
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            color: var(--muted);
            margin-top: 0.75rem;
            letter-spacing: 0.15em;
        }

        .panel-right {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 4rem 4rem 4rem 5rem;
            animation: fadeUp 0.6s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .form-header { margin-bottom: 2.5rem; }

        .form-eyebrow {
            font-size: 0.65rem;
            letter-spacing: 0.25em;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 0.6rem;
        }

        .form-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.8rem;
            font-weight: 400;
            line-height: 1.1;
            color: var(--ink);
        }

        .alert {
            padding: 0.75rem 1rem;
            font-size: 0.72rem;
            letter-spacing: 0.05em;
            margin-bottom: 1.5rem;
            border-left: 3px solid;
        }
        .alert-error   { background: #fdf0ef; color: var(--accent); border-color: var(--accent); }
        .alert-success { background: #eef7f0; color: #27ae60; border-color: #27ae60; }

        .field {
            margin-bottom: 1.4rem;
            position: relative;
        }

        label {
            display: block;
            font-size: 0.65rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 0.5rem;
        }

        input {
            width: 100%;
            padding: 0.8rem 1rem;
            font-family: 'DM Mono', monospace;
            font-size: 0.85rem;
            color: var(--ink);
            background: var(--field);
            border: 1px solid var(--border);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            border-color: var(--ink);
            box-shadow: 3px 3px 0 var(--ink);
        }

        input.is-invalid {
            border-color: var(--accent);
            box-shadow: 3px 3px 0 rgba(192,57,43,0.2);
        }

        .field-error {
            font-size: 0.65rem;
            color: var(--accent);
            margin-top: 0.35rem;
            letter-spacing: 0.05em;
        }

        .btn-submit {
            width: 100%;
            padding: 0.9rem;
            margin-top: 0.5rem;
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #fff;
            background: var(--ink);
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.15s;
        }

        .btn-submit::after {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--accent);
            transform: translateX(-100%);
            transition: transform 0.3s ease;
        }

        .btn-submit:hover::after { transform: translateX(0); }
        .btn-submit:hover { transform: translateY(-1px); }
        .btn-submit span { position: relative; z-index: 1; }

        .form-footer {
            margin-top: 1.5rem;
            font-size: 0.7rem;
            color: var(--muted);
            letter-spacing: 0.05em;
        }

        .form-footer a {
            color: var(--ink);
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        .divider span {
            font-size: 0.62rem;
            color: var(--muted);
            letter-spacing: 0.1em;
        }

        @media (max-width: 768px) {
            body { grid-template-columns: 1fr; overflow: auto; }
            .panel-left { display: none; }
            .panel-right { padding: 3rem 2rem; }
        }
    </style>
</head>
<body>

<div class="panel-left">
    <div class="brand">
        <div class="brand-name">Chroma</div>
        <div class="brand-tag">// colour your world</div>
    </div>

    <div class="panel-art">
        <div class="circles-wrap">
            <div class="circle c1"></div>
            <div class="circle c2"></div>
            <div class="circle c3"></div>
            <div class="circle c4"></div>
        </div>
    </div>

    <div class="panel-quote">
        <p>"Style is a way to say who you are without having to speak."</p>
        <span>— Rachel Zoe</span>
    </div>
</div>

<div class="panel-right">
    <div class="form-header">
        <div class="form-eyebrow">New here?</div>
        <h1 class="form-title">Create your<br/>account.</h1>
    </div>

    <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

    <form th:action="@{/register}" th:object="${registerDTO}" method="post" novalidate>

        <!-- First Name -->
        <div class="field">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName"
                   th:field="*{firstName}"
                   th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'"
                   placeholder="Jane"
                   autocomplete="given-name"/>
            <div class="field-error" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
        </div>

        <!-- Last Name -->
        <div class="field">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName"
                   th:field="*{lastName}"
                   th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'"
                   placeholder="Doe"
                   autocomplete="family-name"/>
            <div class="field-error" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
        </div>

        <!-- Email -->
        <div class="field">
            <label for="email">Email Address</label>
            <input type="email" id="email"
                   th:field="*{email}"
                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                   placeholder="jane@example.com"
                   autocomplete="email"/>
            <div class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>

        <!-- Password -->
        <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password"
                   th:field="*{password}"
                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                   placeholder="Min. 8 characters"
                   autocomplete="new-password"/>
            <div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
        </div>

        <button type="submit" class="btn-submit"><span>Create Account →</span></button>
    </form>

    <div class="divider"><span>or</span></div>

    <div class="form-footer">
        Already have an account? <a th:href="@{/login}">Sign in</a>
    </div>
</div>

</body>
</html>
