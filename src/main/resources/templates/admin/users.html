<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chroma Admin — Users</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <link rel="icon" href="/images/favicon.png">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --ink:    #0e0e0e;
      --paper:  #f5f2ec;
      --accent: #0079b5;
      --muted:  #888070;
      --border: #d4cfc6;
      --field:  #ffffff;
      --success:#2e7d32;
    }
    body { font-family:'DM Mono',monospace; background:var(--paper); display:flex; min-height:100vh; color:var(--ink); }
    .sidebar { width:240px; background:var(--ink); color:#fff; display:flex; flex-direction:column; padding:2rem 0; min-height:100vh; position:fixed; }
    .sidebar-brand { font-family:'Cormorant Garamond',serif; font-size:1.6rem; font-weight:300; letter-spacing:0.2em; padding:0 1.5rem 2rem; border-bottom:1px solid rgba(255,255,255,0.1); }
    .sidebar-brand span { color:var(--accent); }
    .sidebar-label { font-size:0.55rem; letter-spacing:0.25em; color:rgba(255,255,255,0.3); padding:1.5rem 1.5rem 0.5rem; text-transform:uppercase; }
    .sidebar-nav a { display:flex; align-items:center; gap:0.75rem; padding:0.7rem 1.5rem; font-size:0.7rem; letter-spacing:0.12em; color:rgba(255,255,255,0.6); text-decoration:none; border-left:3px solid transparent; transition:all 0.2s; }
    .sidebar-nav a:hover, .sidebar-nav a.active { color:#fff; border-left-color:var(--accent); background:rgba(255,255,255,0.05); }
    .sidebar-footer { margin-top:auto; padding:1.5rem; border-top:1px solid rgba(255,255,255,0.1); }
    .sidebar-footer form button { background:none; border:none; cursor:pointer; font-family:'DM Mono',monospace; font-size:0.65rem; letter-spacing:0.15em; color:rgba(255,255,255,0.4); padding:0; text-transform:uppercase; }
    .sidebar-footer form button:hover { color:var(--accent); }
    .main { margin-left:240px; flex:1; padding:2.5rem; }
    .page-eyebrow { font-size:0.6rem; letter-spacing:0.25em; color:var(--accent); text-transform:uppercase; margin-bottom:0.4rem; }
    .page-title { font-family:'Cormorant Garamond',serif; font-size:2.2rem; font-weight:400; margin-bottom:2rem; }
    .alert { padding:0.75rem 1rem; font-size:0.7rem; margin-bottom:1.5rem; border-left:3px solid #27ae60; background:#eef7f0; color:#27ae60; }
    .table-wrap { background:#fff; border:1px solid var(--border); overflow-x:auto; }
    table { width:100%; border-collapse:collapse; font-size:0.72rem; }
    th { background:var(--ink); color:#fff; padding:0.75rem 1rem; text-align:left; font-size:0.6rem; letter-spacing:0.15em; text-transform:uppercase; font-weight:400; }
    td { padding:0.75rem 1rem; border-bottom:1px solid var(--border); vertical-align:middle; }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:#faf9f6; }
    .badge-user  { display:inline-block; padding:0.2rem 0.6rem; font-size:0.6rem; letter-spacing:0.1em; text-transform:uppercase; background:#e8f4fd; color:#0a58ca; }
    .badge-admin { display:inline-block; padding:0.2rem 0.6rem; font-size:0.6rem; letter-spacing:0.1em; text-transform:uppercase; background:#f8d7da; color:var(--accent); }
    .actions { display:flex; gap:0.5rem; align-items:center; }
    .btn { display:inline-block; padding:0.4rem 0.9rem; font-family:'DM Mono',monospace; font-size:0.62rem; letter-spacing:0.12em; text-transform:uppercase; border:1px solid var(--ink); color:var(--ink); cursor:pointer; background:none; text-decoration:none; transition:all 0.2s; }
    .btn:hover { background:var(--ink); color:#fff; }
    .btn-sm { padding:0.25rem 0.6rem; font-size:0.58rem; }
    .btn-danger { border-color:var(--accent); color:var(--accent); }
    .btn-danger:hover { background:var(--accent); color:#fff; }
    select.role-select { font-family:'DM Mono',monospace; font-size:0.65rem; padding:0.25rem 0.4rem; border:1px solid var(--border); background:#fff; }
  </style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-brand">Chrom<span>a</span></div>
  <div class="sidebar-label">Admin Panel</div>
  <nav class="sidebar-nav">
    <a th:href="@{/admin/dashboard}">⬛ Dashboard</a>
    <a th:href="@{/admin/products}">📦 Products</a>
    <a th:href="@{/admin/orders}">🧾 Orders</a>
    <a th:href="@{/admin/users}" class="active">👤 Users</a>
  </nav>
  <div class="sidebar-footer">
    <form th:action="@{/logout}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit">↩ Logout</button>
    </form>
  </div>
</aside>

<main class="main">
  <div class="page-eyebrow">Management</div>
  <h1 class="page-title">Users</h1>

  <div class="alert" th:if="${success}" th:text="${success}"></div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="u : ${users}">
          <td th:text="${u.id}"></td>
          <td th:text="${u.firstName + ' ' + u.lastName}"></td>
          <td th:text="${u.email}"></td>
          <td>
            <span th:class="${u.role == 'ADMIN'} ? 'badge-admin' : 'badge-user'"
                  th:text="${u.role}"></span>
          </td>
          <td>
            <div class="actions">
              <!-- Change role inline -->
              <form th:action="@{/admin/users/role/{id}(id=${u.id})}" method="post" style="display:flex;gap:0.4rem;align-items:center;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <select name="role" class="role-select">
                  <option value="USER"  th:selected="${u.role == 'USER'}">USER</option>
                  <option value="ADMIN" th:selected="${u.role == 'ADMIN'}">ADMIN</option>
                </select>
                <button type="submit" class="btn btn-sm">Set</button>
              </form>
              <!-- Delete -->
              <form th:action="@{/admin/users/delete/{id}(id=${u.id})}" method="post"
                    onsubmit="return confirm('Delete this user and all their data?')">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-sm btn-danger">Delete</button>
              </form>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</main>
</body>
</html>
