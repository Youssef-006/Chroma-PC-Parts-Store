<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chroma Admin — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #0e0e0e; --paper: #f5f2ec; --accent: #0079b5;
      --muted: #888070; --border: #d4cfc6; --sidebar: #0e0e0e;
    }

    body { font-family: 'DM Mono', monospace; background: var(--paper); display: flex; min-height: 100vh; color: var(--ink); }

    /* ── Sidebar ── */
    .sidebar { width: 240px; background: var(--sidebar); color: #fff; display: flex; flex-direction: column; padding: 2rem 0; min-height: 100vh; position: fixed; top: 0; left: 0; }
    .sidebar-brand { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 300; letter-spacing: 0.2em; color: #fff; padding: 0 1.5rem 2rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sidebar-brand span { color: var(--accent); }
    .sidebar-label { font-size: 0.55rem; letter-spacing: 0.25em; color: rgba(255,255,255,0.3); padding: 1.5rem 1.5rem 0.5rem; text-transform: uppercase; }
    .sidebar-nav a { display: flex; align-items: center; gap: 0.75rem; padding: 0.7rem 1.5rem; font-size: 0.7rem; letter-spacing: 0.12em; color: rgba(255,255,255,0.6); text-decoration: none; transition: all 0.2s; border-left: 3px solid transparent; }
    .sidebar-nav a:hover, .sidebar-nav a.active { color: #fff; border-left-color: var(--accent); background: rgba(255,255,255,0.05); }
    .sidebar-footer { margin-top: auto; padding: 1.5rem; border-top: 1px solid rgba(255,255,255,0.1); }
    .sidebar-footer form button { background: none; border: none; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.15em; color: rgba(255,255,255,0.4); padding: 0; text-transform: uppercase; }
    .sidebar-footer form button:hover { color: var(--accent); }

    /* ── Main ── */
    .main { margin-left: 240px; flex: 1; padding: 2.5rem; }
    .page-header { margin-bottom: 2rem; }
    .page-eyebrow { font-size: 0.6rem; letter-spacing: 0.25em; color: var(--accent); text-transform: uppercase; margin-bottom: 0.4rem; }
    .page-title { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-weight: 400; }

    /* ── Stat cards ── */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.2rem; margin-bottom: 2.5rem; }
    .stat-card { background: #fff; border: 1px solid var(--border); padding: 1.5rem; }
    .stat-label { font-size: 0.6rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-bottom: 0.5rem; }
    .stat-value { font-family: 'Cormorant Garamond', serif; font-size: 2.4rem; font-weight: 400; color: var(--ink); }
    .stat-value.accent { color: var(--accent); }

    /* ── Table ── */
    .section-title { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 1rem; }
    .table-wrap { background: #fff; border: 1px solid var(--border); overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.72rem; }
    th { background: var(--ink); color: #fff; padding: 0.75rem 1rem; text-align: left; font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 400; }
    td { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #faf9f6; }

    .badge { display: inline-block; padding: 0.2rem 0.6rem; font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; }
    .badge-pending    { background: #fff3cd; color: #856404; }
    .badge-processing { background: #cfe2ff; color: #0a58ca; }
    .badge-shipped    { background: #d1ecf1; color: #0c5460; }
    .badge-delivered  { background: #d4edda; color: #155724; }
    .badge-cancelled  { background: #f8d7da; color: #721c24; }

    .btn { display: inline-block; padding: 0.4rem 0.9rem; font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase; text-decoration: none; border: 1px solid var(--ink); color: var(--ink); cursor: pointer; background: none; transition: all 0.2s; }
    .btn:hover { background: var(--ink); color: #fff; }
    .btn-sm { padding: 0.25rem 0.6rem; font-size: 0.58rem; }
  </style>
</head>
<body>

<!-- ── Sidebar ── -->
<aside class="sidebar">
  <div class="sidebar-brand">Chrom<span>a</span></div>
  <div class="sidebar-label">Admin Panel</div>
  <nav class="sidebar-nav">
    <a th:href="@{/admin/dashboard}" class="active">⬛ Dashboard</a>
    <a th:href="@{/admin/products}">📦 Products</a>
    <a th:href="@{/admin/orders}">🧾 Orders</a>
    <a th:href="@{/admin/users}">👤 Users</a>
  </nav>
  <div class="sidebar-footer">
    <form th:action="@{/logout}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit">↩ Logout</button>
    </form>
  </div>
</aside>

<!-- ── Main ── -->
<main class="main">
  <div class="page-header">
    <div class="page-eyebrow">Overview</div>
    <h1 class="page-title">Dashboard</h1>
  </div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Total Products</div>
      <div class="stat-value" th:text="${totalProducts}">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Registered Users</div>
      <div class="stat-value" th:text="${totalUsers}">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Orders</div>
      <div class="stat-value" th:text="${totalOrders}">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Revenue</div>
      <div class="stat-value accent">EGP <span th:text="${#numbers.formatDecimal(totalRevenue,1,0)}">0</span></div>
    </div>
  </div>

  <!-- Recent Orders -->
  <div class="section-title">Recent Orders</div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Order #</th>
          <th>Customer</th>
          <th>Date</th>
          <th>Total</th>
          <th>Status</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="o : ${recentOrders}">
          <td th:text="'#' + ${o.id}"></td>
          <td th:text="${o.user.firstName + ' ' + o.user.lastName}"></td>
          <td th:text="${#temporals.format(o.placedAt,'dd MMM yyyy HH:mm')}"></td>
          <td th:text="'EGP ' + ${#numbers.formatDecimal(o.total,1,0)}"></td>
          <td>
            <span class="badge"
                  th:classappend="'badge-' + ${o.status.toLowerCase()}"
                  th:text="${o.status}"></span>
          </td>
          <td><a class="btn btn-sm" th:href="@{/admin/orders/{id}(id=${o.id})}">View</a></td>
        </tr>
        <tr th:if="${#lists.isEmpty(recentOrders)}">
          <td colspan="6" style="text-align:center;color:var(--muted);padding:2rem;">No orders yet.</td>
        </tr>
      </tbody>
    </table>
  </div>
</main>

</body>
</html>
