<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chroma Admin — Products</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink:    #0e0e0e;
      --paper:  #f5f2ec;
      --accent: #0079b5;
      --muted:  #888070;
      --border: #d4cfc6;
      --field:  #ffffff;
      --success:#2e7d32;
    }
    body { font-family:'DM Mono',monospace; background:var(--paper); display:flex; min-height:100vh; color:var(--ink); }
    .sidebar { width:240px; background:var(--ink); color:#fff; display:flex; flex-direction:column; padding:2rem 0; min-height:100vh; position:fixed; top:0; left:0; }
    .sidebar-brand { font-family:'Cormorant Garamond',serif; font-size:1.6rem; font-weight:300; letter-spacing:0.2em; color:#fff; padding:0 1.5rem 2rem; border-bottom:1px solid rgba(255,255,255,0.1); }
    .sidebar-brand span { color:var(--accent); }
    .sidebar-label { font-size:0.55rem; letter-spacing:0.25em; color:rgba(255,255,255,0.3); padding:1.5rem 1.5rem 0.5rem; text-transform:uppercase; }
    .sidebar-nav a { display:flex; align-items:center; gap:0.75rem; padding:0.7rem 1.5rem; font-size:0.7rem; letter-spacing:0.12em; color:rgba(255,255,255,0.6); text-decoration:none; transition:all 0.2s; border-left:3px solid transparent; }
    .sidebar-nav a:hover, .sidebar-nav a.active { color:#fff; border-left-color:var(--accent); background:rgba(255,255,255,0.05); }
    .sidebar-footer { margin-top:auto; padding:1.5rem; border-top:1px solid rgba(255,255,255,0.1); }
    .sidebar-footer form button { background:none; border:none; cursor:pointer; font-family:'DM Mono',monospace; font-size:0.65rem; letter-spacing:0.15em; color:rgba(255,255,255,0.4); padding:0; text-transform:uppercase; }
    .sidebar-footer form button:hover { color:var(--accent); }
    .main { margin-left:240px; flex:1; padding:2.5rem; }
    .page-header { margin-bottom:2rem; display:flex; align-items:flex-end; justify-content:space-between; }
    .page-eyebrow { font-size:0.6rem; letter-spacing:0.25em; color:var(--accent); text-transform:uppercase; margin-bottom:0.4rem; }
    .page-title { font-family:'Cormorant Garamond',serif; font-size:2.2rem; font-weight:400; }
    .alert { padding:0.75rem 1rem; font-size:0.7rem; margin-bottom:1.5rem; border-left:3px solid #27ae60; background:#eef7f0; color:#27ae60; }
    .layout { display:grid; grid-template-columns:1fr 360px; gap:2rem; align-items:start; }
    .table-wrap { background:#fff; border:1px solid var(--border); overflow-x:auto; }
    table { width:100%; border-collapse:collapse; font-size:0.72rem; }
    th { background:var(--ink); color:#fff; padding:0.75rem 1rem; text-align:left; font-size:0.6rem; letter-spacing:0.15em; text-transform:uppercase; font-weight:400; }
    td { padding:0.7rem 1rem; border-bottom:1px solid var(--border); vertical-align:middle; }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:#faf9f6; }
    .form-card { background:#fff; border:1px solid var(--border); padding:1.5rem; }
    .form-card h2 { font-family:'Cormorant Garamond',serif; font-size:1.4rem; font-weight:400; margin-bottom:1.2rem; }
    .field { margin-bottom:1rem; }
    label { display:block; font-size:0.6rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted); margin-bottom:0.4rem; }
    input, select, textarea { width:100%; padding:0.6rem 0.8rem; font-family:'DM Mono',monospace; font-size:0.78rem; border:1px solid var(--border); background:#fafaf8; color:var(--ink); outline:none; }
    input:focus, select:focus, textarea:focus { border-color:var(--ink); }
    textarea { height:80px; resize:vertical; }
    .btn { display:inline-block; padding:0.5rem 1rem; font-family:'DM Mono',monospace; font-size:0.62rem; letter-spacing:0.12em; text-transform:uppercase; border:1px solid var(--ink); color:var(--ink); cursor:pointer; background:none; text-decoration:none; transition:all 0.2s; }
    .btn:hover { background:var(--ink); color:#fff; }
    .btn-primary { background:var(--ink); color:#fff; }
    .btn-primary:hover { background:#333; }
    .btn-danger { border-color:var(--accent); color:var(--accent); }
    .btn-danger:hover { background:var(--accent); color:#fff; }
    .btn-sm { padding:0.25rem 0.6rem; font-size:0.58rem; }
    .actions { display:flex; gap:0.5rem; }
  </style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-brand">Chrom<span>a</span></div>
  <div class="sidebar-label">Admin Panel</div>
  <nav class="sidebar-nav">
    <a th:href="@{/admin/dashboard}">⬛ Dashboard</a>
    <a th:href="@{/admin/products}" class="active">📦 Products</a>
    <a th:href="@{/admin/orders}">🧾 Orders</a>
    <a th:href="@{/admin/users}">👤 Users</a>
  </nav>
  <div class="sidebar-footer">
    <form th:action="@{/logout}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit">↩ Logout</button>
    </form>
  </div>
</aside>

<main class="main">
  <div class="page-header">
    <div>
      <div class="page-eyebrow">Inventory</div>
      <h1 class="page-title">Products</h1>
    </div>
  </div>

  <div class="alert" th:if="${success}" th:text="${success}"></div>

  <div class="layout">
    <!-- Product Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th><th>Name</th><th>Category</th><th>Price (EGP)</th><th>Stock</th><th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="p : ${products}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.name}"></td>
            <td th:text="${p.category}"></td>
            <td th:text="${#numbers.formatDecimal(p.price,1,0)}"></td>
            <td th:text="${p.quantity}"></td>
            <td>
              <div class="actions">
                <a class="btn btn-sm" th:href="@{/admin/products/edit/{id}(id=${p.id})}">Edit</a>
                <form th:action="@{/admin/products/delete/{id}(id=${p.id})}" method="post" style="display:inline;"
                      onsubmit="return confirm('Delete this product?')">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <button class="btn btn-sm btn-danger" type="submit">Delete</button>
                </form>
              </div>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(products)}">
            <td colspan="6" style="text-align:center;color:var(--muted);padding:2rem;">No products found.</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Add / Edit Form -->
    <div class="form-card">
      <h2 th:text="${newProduct.id != null} ? 'Edit Product' : 'Add Product'">Add Product</h2>
      <form th:action="@{/admin/products/save}" method="post" th:object="${newProduct}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" th:field="*{id}"/>
        <div class="field">
          <label>Product Name</label>
          <input type="text" th:field="*{name}" placeholder="e.g. AMD Ryzen 9 9950X" required/>
        </div>
        <div class="field">
          <label>Category</label>
          <select th:field="*{category}" required>
            <option value="">— Select —</option>
            <option value="CPU">CPU</option>
            <option value="GPU">GPU</option>
            <option value="RAM">RAM</option>
            <option value="MBoard">Motherboard</option>
            <option value="Monitor">Monitor</option>
            <option value="PWsupply">Power Supply</option>
            <option value="Case">Case</option>
            <option value="Cooling">Cooling</option>
            <option value="Accessories">Accessories</option>
            <option value="FBuilds">Full Builds</option>
          </select>
        </div>
        <div class="field">
          <label>Description</label>
          <textarea th:field="*{description}" placeholder="Short product description…"></textarea>
        </div>
        <div class="field">
          <label>Price (EGP)</label>
          <input type="number" step="0.01" th:field="*{price}" placeholder="0.00" required/>
        </div>
        <div class="field">
          <label>Stock Quantity</label>
          <input type="number" th:field="*{quantity}" placeholder="0" required/>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">
          <span th:text="${newProduct.id != null} ? 'Update Product' : 'Add Product'">Save</span>
        </button>
        <a th:if="${newProduct.id != null}" th:href="@{/admin/products}" class="btn" style="width:100%;margin-top:0.5rem;text-align:center;">Cancel</a>
      </form>
    </div>
  </div>
</main>
</body>
</html>
