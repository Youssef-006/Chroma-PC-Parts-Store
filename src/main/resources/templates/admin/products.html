<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chroma Admin — Products</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <link rel="icon" href="/images/favicon.png">
  
  <link rel="stylesheet" th:href="@{/css/admin/products.css}"/>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-brand">Chrom<span>a</span></div>
  <div class="sidebar-label">Admin Panel</div>
  <nav class="sidebar-nav">
    <a th:href="@{/admin/dashboard}">⬛ Dashboard</a>
    <a th:href="@{/admin/products}" class="active">📦 Products</a>
    <a th:href="@{/admin/orders}">🧾 Orders</a>
    <a th:href="@{/admin/users}">👤 Users</a>
  </nav>
  <div class="sidebar-footer">
    <form th:action="@{/logout}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit">↩ Logout</button>
    </form>
  </div>
</aside>

<main class="main">
  <div class="page-header">
    <div>
      <div class="page-eyebrow">Inventory</div>
      <h1 class="page-title">Products</h1>
    </div>
  </div>

  <div class="alert" th:if="${success}" th:text="${success}"></div>

  <div class="layout">
    <!-- Product Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th><th>Name</th><th>Category</th><th>Price (EGP)</th><th>Stock</th><th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="p : ${products}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.name}"></td>
            <td th:text="${p.category}"></td>
            <td th:text="${#numbers.formatDecimal(p.price,1,0)}"></td>
            <td th:text="${p.quantity}"></td>
            <td>
              <div class="actions">
                <a class="btn btn-sm" th:href="@{/admin/products/edit/{id}(id=${p.id})}">Edit</a>
                <form th:action="@{/admin/products/delete/{id}(id=${p.id})}" method="post" style="display:inline;"
                      onsubmit="return confirm('Delete this product?')">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <button class="btn btn-sm btn-danger" type="submit">Delete</button>
                </form>
              </div>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(products)}">
            <td colspan="6" style="text-align:center;color:var(--muted);padding:2rem;">No products found.</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Add / Edit Form -->
    <div class="form-card">
      <h2 th:text="${newProduct.id != null} ? 'Edit Product' : 'Add Product'">Add Product</h2>
      <form th:action="@{/admin/products/save}" method="post" th:object="${newProduct}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" th:field="*{id}"/>
        <div class="field">
          <label>Product Name</label>
          <input type="text" th:field="*{name}" placeholder="e.g. AMD Ryzen 9 9950X" required/>
        </div>
        <div class="field">
          <label>Category</label>
          <select th:field="*{category}" required>
            <option value="">— Select —</option>
            <option value="CPU">CPU</option>
            <option value="GPU">GPU</option>
            <option value="RAM">RAM</option>
            <option value="MBoard">Motherboard</option>
            <option value="Monitor">Monitor</option>
            <option value="PWsupply">Power Supply</option>
            <option value="Case">Case</option>
            <option value="Cooling">Cooling</option>
            <option value="Accessories">Accessories</option>
            <option value="FBuilds">Full Builds</option>
          </select>
        </div>
        <div class="field">
          <label>Description</label>
          <textarea th:field="*{description}" placeholder="Short product description…"></textarea>
        </div>
        <div class="field">
          <label>Price (EGP)</label>
          <input type="number" step="0.01" th:field="*{price}" placeholder="0.00" required/>
        </div>
        <div class="field">
          <label>Stock Quantity</label>
          <input type="number" th:field="*{quantity}" placeholder="0" required/>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">
          <span th:text="${newProduct.id != null} ? 'Update Product' : 'Add Product'">Save</span>
        </button>
        <a th:if="${newProduct.id != null}" th:href="@{/admin/products}" class="btn" style="width:100%;margin-top:0.5rem;text-align:center;">Cancel</a>
      </form>
    </div>
  </div>
</main>
</body>
</html>
