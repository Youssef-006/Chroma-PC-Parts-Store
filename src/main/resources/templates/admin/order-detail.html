<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Chroma Admin — Order Detail</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <link rel="icon" href="/images/favicon.png">
  
  <link rel="stylesheet" th:href="@{/css/admin/order-detail.css}"/>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-brand">Chrom<span>a</span></div>
  <div class="sidebar-label">Admin Panel</div>
  <nav class="sidebar-nav">
    <a th:href="@{/admin/dashboard}">⬛ Dashboard</a>
    <a th:href="@{/admin/products}">📦 Products</a>
    <a th:href="@{/admin/orders}" class="active">🧾 Orders</a>
    <a th:href="@{/admin/users}">👤 Users</a>
  </nav>
  <div class="sidebar-footer">
    <form th:action="@{/logout}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit">↩ Logout</button>
    </form>
  </div>
</aside>

<main class="main">
  <a th:href="@{/admin/orders}" class="back">← Back to Orders</a>
  <h1 class="page-title" th:text="'Order #' + ${order.id}">Order Detail</h1>

  <div class="alert" th:if="${success}" th:text="${success}"></div>

  <div class="grid">
    <div>
      <!-- Items -->
      <div class="card">
        <h2>Items Ordered</h2>
        <table>
          <thead>
            <tr><th>Product</th><th>Category</th><th>Unit Price</th><th>Qty</th><th>Line Total</th></tr>
          </thead>
          <tbody>
            <tr th:each="item : ${order.items}">
              <td th:text="${item.productName}"></td>
              <td th:text="${item.productCategory}"></td>
              <td th:text="'EGP ' + ${#numbers.formatDecimal(item.unitPrice,1,0)}"></td>
              <td th:text="${item.quantity}"></td>
              <td th:text="'EGP ' + ${#numbers.formatDecimal(item.lineTotal,1,0)}"></td>
            </tr>
            <tr class="total-row">
              <td colspan="4" style="text-align:right;">Total</td>
              <td th:text="'EGP ' + ${#numbers.formatDecimal(order.total,1,0)}"></td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Shipping -->
      <div class="card">
        <h2>Shipping Info</h2>
        <div class="info-row"><span class="info-label">Address</span><span th:text="${order.address}"></span></div>
        <div class="info-row"><span class="info-label">City</span><span th:text="${order.city}"></span></div>
        <div class="info-row"><span class="info-label">Governorate</span><span th:text="${order.governorate}"></span></div>
        <div class="info-row"><span class="info-label">Phone</span><span th:text="${order.phone}"></span></div>
        <div class="info-row"><span class="info-label">Leave at Door</span><span th:text="${order.leaveAtDoor} ? 'Yes' : 'No'"></span></div>
        <div class="info-row"><span class="info-label">Payment</span><span th:text="${order.paymentMethod}"></span></div>
      </div>
    </div>

    <div>
      <!-- Customer -->
      <div class="card">
        <h2>Customer</h2>
        <div class="info-row"><span class="info-label">Name</span><span th:text="${order.user.firstName + ' ' + order.user.lastName}"></span></div>
        <div class="info-row"><span class="info-label">Email</span><span th:text="${order.user.email}"></span></div>
        <div class="info-row"><span class="info-label">Placed At</span><span th:text="${#temporals.format(order.placedAt,'dd MMM yyyy HH:mm')}"></span></div>
      </div>

      <!-- Status -->
      <div class="card">
        <h2>Status</h2>
        <div style="margin-bottom:1rem;">
          <span class="badge"
                th:classappend="'badge-' + ${order.status.toLowerCase()}"
                th:text="${order.status}"></span>
        </div>
        <form class="status-form" th:action="@{/admin/orders/{id}/status(id=${order.id})}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <select name="status">
            <option value="PENDING"    th:selected="${order.status == 'PENDING'}">PENDING</option>
            <option value="PROCESSING" th:selected="${order.status == 'PROCESSING'}">PROCESSING</option>
            <option value="SHIPPED"    th:selected="${order.status == 'SHIPPED'}">SHIPPED</option>
            <option value="DELIVERED"  th:selected="${order.status == 'DELIVERED'}">DELIVERED</option>
            <option value="CANCELLED"  th:selected="${order.status == 'CANCELLED'}">CANCELLED</option>
          </select>
          <button type="submit" class="btn">Update Status</button>
        </form>
      </div>
    </div>
  </div>
</main>
</body>
</html>
