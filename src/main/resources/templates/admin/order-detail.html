<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Chroma Admin — Order Detail</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --ink:    #0e0e0e;
      --paper:  #f5f2ec;
      --accent: #0079b5;
      --muted:  #888070;
      --border: #d4cfc6;
      --field:  #ffffff;
      --success:#2e7d32;
    }
    body { font-family:'DM Mono',monospace; background:var(--paper); display:flex; min-height:100vh; color:var(--ink); }
    .sidebar { width:240px; background:var(--ink); color:#fff; display:flex; flex-direction:column; padding:2rem 0; min-height:100vh; position:fixed; }
    .sidebar-brand { font-family:'Cormorant Garamond',serif; font-size:1.6rem; font-weight:300; letter-spacing:0.2em; padding:0 1.5rem 2rem; border-bottom:1px solid rgba(255,255,255,0.1); }
    .sidebar-brand span { color:var(--accent); }
    .sidebar-label { font-size:0.55rem; letter-spacing:0.25em; color:rgba(255,255,255,0.3); padding:1.5rem 1.5rem 0.5rem; text-transform:uppercase; }
    .sidebar-nav a { display:flex; align-items:center; gap:0.75rem; padding:0.7rem 1.5rem; font-size:0.7rem; letter-spacing:0.12em; color:rgba(255,255,255,0.6); text-decoration:none; border-left:3px solid transparent; transition:all 0.2s; }
    .sidebar-nav a:hover, .sidebar-nav a.active { color:#fff; border-left-color:var(--accent); background:rgba(255,255,255,0.05); }
    .sidebar-footer { margin-top:auto; padding:1.5rem; border-top:1px solid rgba(255,255,255,0.1); }
    .sidebar-footer form button { background:none; border:none; cursor:pointer; font-family:'DM Mono',monospace; font-size:0.65rem; letter-spacing:0.15em; color:rgba(255,255,255,0.4); padding:0; text-transform:uppercase; }
    .main { margin-left:240px; flex:1; padding:2.5rem; }
    .back { font-size:0.65rem; color:var(--muted); text-decoration:none; letter-spacing:0.1em; display:inline-block; margin-bottom:1.5rem; }
    .back:hover { color:var(--ink); }
    .page-title { font-family:'Cormorant Garamond',serif; font-size:2rem; font-weight:400; margin-bottom:2rem; }
    .alert { padding:0.75rem 1rem; font-size:0.7rem; margin-bottom:1.5rem; border-left:3px solid #27ae60; background:#eef7f0; color:#27ae60; }
    .grid { display:grid; grid-template-columns:1fr 300px; gap:2rem; align-items:start; }
    .card { background:#fff; border:1px solid var(--border); padding:1.5rem; margin-bottom:1.5rem; }
    .card h2 { font-family:'Cormorant Garamond',serif; font-size:1.2rem; font-weight:400; margin-bottom:1rem; padding-bottom:0.5rem; border-bottom:1px solid var(--border); }
    .info-row { display:flex; justify-content:space-between; padding:0.4rem 0; font-size:0.72rem; border-bottom:1px solid #f0ede8; }
    .info-row:last-child { border-bottom:none; }
    .info-label { color:var(--muted); }
    table { width:100%; border-collapse:collapse; font-size:0.72rem; }
    th { background:var(--ink); color:#fff; padding:0.6rem 0.8rem; text-align:left; font-size:0.58rem; letter-spacing:0.15em; text-transform:uppercase; font-weight:400; }
    td { padding:0.6rem 0.8rem; border-bottom:1px solid var(--border); }
    tr:last-child td { border-bottom:none; }
    .badge { display:inline-block; padding:0.25rem 0.75rem; font-size:0.65rem; letter-spacing:0.1em; text-transform:uppercase; }
    .badge-pending    { background:#fff3cd; color:#856404; }
    .badge-processing { background:#cfe2ff; color:#0a58ca; }
    .badge-shipped    { background:#d1ecf1; color:#0c5460; }
    .badge-delivered  { background:#d4edda; color:#155724; }
    .badge-cancelled  { background:#f8d7da; color:#721c24; }
    .status-form select { width:100%; padding:0.6rem; font-family:'DM Mono',monospace; font-size:0.72rem; border:1px solid var(--border); margin-bottom:0.75rem; }
    .btn { width:100%; padding:0.65rem; font-family:'DM Mono',monospace; font-size:0.65rem; letter-spacing:0.15em; text-transform:uppercase; background:var(--ink); color:#fff; border:none; cursor:pointer; }
    .btn:hover { background:#333; }
    .total-row td { font-weight:bold; background:#faf9f6; }
  </style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-brand">Chrom<span>a</span></div>
  <div class="sidebar-label">Admin Panel</div>
  <nav class="sidebar-nav">
    <a th:href="@{/admin/dashboard}">⬛ Dashboard</a>
    <a th:href="@{/admin/products}">📦 Products</a>
    <a th:href="@{/admin/orders}" class="active">🧾 Orders</a>
    <a th:href="@{/admin/users}">👤 Users</a>
  </nav>
  <div class="sidebar-footer">
    <form th:action="@{/logout}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit">↩ Logout</button>
    </form>
  </div>
</aside>

<main class="main">
  <a th:href="@{/admin/orders}" class="back">← Back to Orders</a>
  <h1 class="page-title" th:text="'Order #' + ${order.id}">Order Detail</h1>

  <div class="alert" th:if="${success}" th:text="${success}"></div>

  <div class="grid">
    <div>
      <!-- Items -->
      <div class="card">
        <h2>Items Ordered</h2>
        <table>
          <thead>
            <tr><th>Product</th><th>Category</th><th>Unit Price</th><th>Qty</th><th>Line Total</th></tr>
          </thead>
          <tbody>
            <tr th:each="item : ${order.items}">
              <td th:text="${item.productName}"></td>
              <td th:text="${item.productCategory}"></td>
              <td th:text="'EGP ' + ${#numbers.formatDecimal(item.unitPrice,1,0)}"></td>
              <td th:text="${item.quantity}"></td>
              <td th:text="'EGP ' + ${#numbers.formatDecimal(item.lineTotal,1,0)}"></td>
            </tr>
            <tr class="total-row">
              <td colspan="4" style="text-align:right;">Total</td>
              <td th:text="'EGP ' + ${#numbers.formatDecimal(order.total,1,0)}"></td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Shipping -->
      <div class="card">
        <h2>Shipping Info</h2>
        <div class="info-row"><span class="info-label">Address</span><span th:text="${order.address}"></span></div>
        <div class="info-row"><span class="info-label">City</span><span th:text="${order.city}"></span></div>
        <div class="info-row"><span class="info-label">Governorate</span><span th:text="${order.governorate}"></span></div>
        <div class="info-row"><span class="info-label">Phone</span><span th:text="${order.phone}"></span></div>
        <div class="info-row"><span class="info-label">Leave at Door</span><span th:text="${order.leaveAtDoor} ? 'Yes' : 'No'"></span></div>
        <div class="info-row"><span class="info-label">Payment</span><span th:text="${order.paymentMethod}"></span></div>
      </div>
    </div>

    <div>
      <!-- Customer -->
      <div class="card">
        <h2>Customer</h2>
        <div class="info-row"><span class="info-label">Name</span><span th:text="${order.user.firstName + ' ' + order.user.lastName}"></span></div>
        <div class="info-row"><span class="info-label">Email</span><span th:text="${order.user.email}"></span></div>
        <div class="info-row"><span class="info-label">Placed At</span><span th:text="${#temporals.format(order.placedAt,'dd MMM yyyy HH:mm')}"></span></div>
      </div>

      <!-- Status -->
      <div class="card">
        <h2>Status</h2>
        <div style="margin-bottom:1rem;">
          <span class="badge"
                th:classappend="'badge-' + ${order.status.toLowerCase()}"
                th:text="${order.status}"></span>
        </div>
        <form class="status-form" th:action="@{/admin/orders/{id}/status(id=${order.id})}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <select name="status">
            <option value="PENDING"    th:selected="${order.status == 'PENDING'}">PENDING</option>
            <option value="PROCESSING" th:selected="${order.status == 'PROCESSING'}">PROCESSING</option>
            <option value="SHIPPED"    th:selected="${order.status == 'SHIPPED'}">SHIPPED</option>
            <option value="DELIVERED"  th:selected="${order.status == 'DELIVERED'}">DELIVERED</option>
            <option value="CANCELLED"  th:selected="${order.status == 'CANCELLED'}">CANCELLED</option>
          </select>
          <button type="submit" class="btn">Update Status</button>
        </form>
      </div>
    </div>
  </div>
</main>
</body>
</html>
