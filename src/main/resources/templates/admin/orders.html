<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chroma Admin — Orders</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <link rel="icon" href="/images/favicon.png">
  
  <link rel="stylesheet" th:href="@{/css/admin/orders.css}"/>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-brand">Chrom<span>a</span></div>
  <div class="sidebar-label">Admin Panel</div>
  <nav class="sidebar-nav">
    <a th:href="@{/admin/dashboard}">⬛ Dashboard</a>
    <a th:href="@{/admin/products}">📦 Products</a>
    <a th:href="@{/admin/orders}" class="active">🧾 Orders</a>
    <a th:href="@{/admin/users}">👤 Users</a>
  </nav>
  <div class="sidebar-footer">
    <form th:action="@{/logout}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit">↩ Logout</button>
    </form>
  </div>
</aside>

<main class="main">
  <div class="page-eyebrow">Transactions</div>
  <h1 class="page-title">All Orders</h1>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Order #</th><th>Customer</th><th>Email</th><th>Date</th>
          <th>Items</th><th>Total</th><th>Payment</th><th>Status</th><th></th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="o : ${orders}">
          <td th:text="'#' + ${o.id}"></td>
          <td th:text="${o.user.firstName + ' ' + o.user.lastName}"></td>
          <td th:text="${o.user.email}"></td>
          <td th:text="${#temporals.format(o.placedAt,'dd MMM yyyy HH:mm')}"></td>
          <td th:text="${o.items.size()}"></td>
          <td th:text="'EGP ' + ${#numbers.formatDecimal(o.total,1,0)}"></td>
          <td th:text="${o.paymentMethod}"></td>
          <td>
            <span class="badge"
                  th:classappend="'badge-' + ${o.status.toLowerCase()}"
                  th:text="${o.status}"></span>
          </td>
          <td><a class="btn btn-sm" th:href="@{/admin/orders/{id}(id=${o.id})}">View</a></td>
        </tr>
        <tr th:if="${#lists.isEmpty(orders)}">
          <td colspan="9" style="text-align:center;color:var(--muted);padding:2rem;">No orders yet.</td>
        </tr>
      </tbody>
    </table>
  </div>
</main>
</body>
</html>
