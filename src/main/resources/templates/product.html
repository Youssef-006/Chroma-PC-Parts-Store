<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chroma — Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:    #0e0e0e;
      --paper:  #f5f2ec;
      --accent: #0079b5;
      --muted:  #888070;
      --border: #d4cfc6;
      --field:  #ffffff;
    }

    body {
      min-height: 100vh;
      background: var(--paper);
      font-family: 'DM Mono', monospace;
      color: var(--ink);
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--ink);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 3rem;
      height: 60px;
    }

    .nav-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #fff;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .nav-links a {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover, .nav-links a.active { color: #fff; }

    .nav-cart {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--paper);
      background: var(--accent);
      border: none;
      padding: 0.5rem 1.2rem;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .nav-cart:hover { opacity: 0.85; }

    /* ── HERO STRIP ── */
    .hero-strip {
      background: var(--ink);
      padding: 3.5rem 3rem 3rem;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-strip::after {
      content: '';
      position: absolute;
      right: -60px; bottom: -60px;
      width: 300px; height: 300px;
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 50%;
    }

    .hero-eyebrow {
      font-size: 0.62rem;
      letter-spacing: 0.3em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 0.6rem;
    }

    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 300;
      color: #fff;
      line-height: 1.1;
    }

    /* ── FILTER BAR ── */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1.25rem 3rem;
      border-bottom: 1px solid var(--border);
      background: var(--paper);
      flex-wrap: wrap;
    }

    .filter-label {
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-right: 0.5rem;
    }

    .filter-chip {
      padding: 0.35rem 0.9rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-chip:hover, .filter-chip.active {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }

    .search-wrap {
      margin-left: auto;
      position: relative;
    }

    .search-wrap input {
      padding: 0.4rem 1rem 0.4rem 2.2rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      border: 1px solid var(--border);
      background: var(--field);
      color: var(--ink);
      outline: none;
      width: 220px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-wrap input:focus {
      border-color: var(--ink);
      box-shadow: 2px 2px 0 var(--ink);
    }

    .search-icon {
      position: absolute;
      left: 0.7rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.8rem;
    }

    /* ── PRODUCT GRID ── */
    .shop-main {
      padding: 2.5rem 3rem 4rem;
    }

    .results-count {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-bottom: 2rem;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.5rem;
    }

    /* ── PRODUCT CARD ── */
    .product-card {
      background: var(--field);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: transform 0.2s, box-shadow 0.2s;
      animation: fadeUp 0.5s ease both;
    }

    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: 6px 6px 0 var(--ink);
    }

    .card-image {
      aspect-ratio: 3/2;
      background: #e8e4dc;
      position: relative;
      overflow: hidden;
    }

    .card-image-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
              repeating-linear-gradient(
                      45deg,
                      transparent,
                      transparent 10px,
                      rgba(0,0,0,0.03) 10px,
                      rgba(0,0,0,0.03) 11px
              );
    }

    .card-image-placeholder .icon {
      font-size: 3.5rem;
      opacity: 0.18;
      user-select: none;
    }

    .card-badge {
      position: absolute;
      top: 0.75rem;
      left: 0.75rem;
      background: var(--accent);
      color: #fff;
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.2rem 0.5rem;
    }

    .card-body {
      padding: 1.25rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .card-category {
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.35rem;
    }

    .card-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem;
      font-weight: 400;
      line-height: 1.2;
      color: var(--ink);
      margin-bottom: 0.5rem;
    }

    .card-desc {
      font-size: 0.68rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 1rem;
      flex: 1;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--border);
      padding-top: 1rem;
      gap: 0.5rem;
    }

    .card-price {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--ink);
    }

    .card-price small {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      font-weight: 300;
      color: var(--muted);
    }

    .card-stock {
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .card-stock.low { color: var(--accent); }

    .btn-add {
      padding: 0.55rem 1rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #fff;
      background: var(--ink);
      border: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s;
      white-space: nowrap;
    }

    .btn-add::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      transform: translateX(-100%);
      transition: transform 0.25s ease;
    }

    .btn-add:hover::after { transform: translateX(0); }
    .btn-add:hover { transform: translateY(-1px); }
    .btn-add span { position: relative; z-index: 1; }

    /* ── EMPTY STATE ── */
    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 5rem 2rem;
      display: none;
    }

    .empty-state.visible { display: block; }

    .empty-state p {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      color: var(--muted);
      font-style: italic;
    }

    .empty-state small {
      display: block;
      margin-top: 0.5rem;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--muted);
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--ink);
      color: #fff;
      padding: 0.75rem 1.5rem;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      transform: translateY(120%);
      transition: transform 0.3s ease;
      z-index: 999;
      border-left: 3px solid var(--accent);
      pointer-events: none;
    }

    .toast.show {
      transform: translateY(0);
      pointer-events: auto;
    }

    @media (max-width: 768px) {
      nav { padding: 0 1.5rem; }
      .filter-bar { padding: 1rem 1.5rem; }
      .shop-main { padding: 2rem 1.5rem; }
      .hero-strip { padding: 2.5rem 1.5rem 2rem; }
      .search-wrap { width: 100%; }
      .search-wrap input { width: 100%; }
    }
  </style>
</head>
<body>

<!-- ── NAV ── -->
<nav>
  <a href="/home" class="nav-brand">Chrom<em>a</em></a>
  <div class="nav-links" id="navLinks">
    <a th:href="@{/home}" class="active">Home</a>
    <a th:href="@{/product}">Store</a>
    <a th:href="@{/orders}">My Orders</a>
    <!-- Spring Security logout requires POST -->
    <form th:action="@{/logout}" method="post" style="display:inline;">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit" style="background:none;border:none;cursor:pointer;font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.6);font-family:'DM Mono',monospace;padding:0;">Logout</button>
    </form>
    <a th:href="@{/cart}" class="nav-cart">
      <span>Cart</span>
      <span id="cart-count" style="background:var(--paper);color:var(--ink);padding:0.1rem 0.4rem;font-size:0.6rem;">0</span>
    </a>
  </div>
</nav>

<!-- ── HERO ── -->
<div class="hero-strip">
  <div class="hero-eyebrow">New Collection — 2025</div>
  <h1 class="hero-title">Colour your<br/>world.</h1>
</div>

<!-- ── FILTER BAR ── -->
<div class="filter-bar">
  <span class="filter-label">Filter</span>
  <button class="filter-chip active" onclick="filterProducts('all', this)">All</button>
  <button class="filter-chip" onclick="filterProducts('CPU', this)">CPU</button>
  <button class="filter-chip" onclick="filterProducts('GPU', this)">GPU</button>
  <button class="filter-chip" onclick="filterProducts('RAM', this)">RAM</button>
  <button class="filter-chip" onclick="filterProducts('MBoard', this)">Motherboard</button>
  <button class="filter-chip" onclick="filterProducts('Monitor', this)">Monitor</button>
  <button class="filter-chip" onclick="filterProducts('PWsupply', this)">Power Supply</button>
  <button class="filter-chip" onclick="filterProducts('Case', this)">Case</button>
  <button class="filter-chip" onclick="filterProducts('Accessories', this)">Accessories</button>
  <button class="filter-chip" onclick="filterProducts('FBuilds', this)">Full Builds</button>
  <button class="filter-chip" onclick="filterProducts('Cooling', this)">Cooling</button>

  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" placeholder="Search products…" id="searchInput" oninput="applyFilters()"/>
  </div>
</div>

<!-- ── MAIN ── -->
<main class="shop-main">
  <div class="results-count" id="resultsCount">— products</div>

  <div class="product-grid" id="productGrid">

    <!-- ══ Dynamic products rendered from DB ══ -->
    <div class="product-card"
         th:each="p : ${products}"
         th:attr="data-category=${p.category},data-name=${p.name}">
      <div class="card-image">
        <div class="card-image-placeholder">
          <span class="icon" th:text="${
            p.category == 'CPU'      ? '🔲' :
            p.category == 'GPU'      ? '🖥️' :
            p.category == 'RAM'      ? '📦' :
            p.category == 'MBoard'   ? '🔌' :
            p.category == 'Monitor'  ? '🖵'  :
            p.category == 'PWsupply' ? '⚡'  :
            p.category == 'Case'     ? '🗃️' :
            p.category == 'Cooling'  ? '❄️'  :
            p.category == 'FBuilds'  ? '🖥'  :
            '🔧'}">🔧</span>
        </div>
        <span class="card-badge" th:if="${p.quantity != null and p.quantity <= 3 and p.quantity > 0}">Low Stock</span>
        <span class="card-badge" th:if="${p.quantity != null and p.quantity == 0}" style="background:var(--muted);">Out of Stock</span>
      </div>
      <div class="card-body">
        <div class="card-category" th:text="${p.category}">Category</div>
        <div class="card-name"     th:text="${p.name}">Name</div>
        <div class="card-desc"     th:text="${p.description}">Desc</div>
        <div class="card-footer">
          <div>
            <div class="card-price">
              <small>EGP </small><span th:text="${#numbers.formatDecimal(p.price,1,0)}">0</span>
            </div>
            <div class="card-stock"
                 th:classappend="${p.quantity != null and p.quantity <= 3} ? 'low' : ''"
                 th:text="${p.quantity != null} ? ${p.quantity} + ' in stock' : 'In stock'">In stock</div>
          </div>
          <button class="btn-add"
                  th:attr="onclick='addToCart(' + ${p.id} + ', this)'"
                  th:disabled="${p.quantity != null and p.quantity == 0}">
            <span>Add +</span>
          </button>
        </div>
      </div>
    </div>


    <!-- Empty state -->
    <div class="empty-state" id="emptyState">
      <p>No products found.</p>
      <small>Try a different filter or search term</small>
    </div>

  </div>
</main>

<!-- ── TOAST ── -->
<div class="toast" id="toast">Added to cart</div>

<script>
  let currentFilter = 'all';

  function filterProducts(category, btn) {
    currentFilter = category;
    if (btn) {
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
    }
    applyFilters();
  }

  function applyFilters() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const cards = document.querySelectorAll('.product-card');
    let visible = 0;

    cards.forEach(card => {
      const cat  = (card.dataset.category || '').toLowerCase();
      const name = (card.dataset.name || '').toLowerCase();
      const matchCat    = currentFilter === 'all' || cat === currentFilter.toLowerCase();
      const matchSearch = name.includes(query) || cat.includes(query);

      if (matchCat && matchSearch) {
        card.style.display = '';
        visible++;
      } else {
        card.style.display = 'none';
      }
    });

    document.getElementById('resultsCount').textContent =
            visible === 1 ? '1 product' : visible + ' products';

    document.getElementById('emptyState').classList.toggle('visible', visible === 0);
  }

  function addToCart(productId, btn) {
    fetch(`/cart/add/${productId}`, { method: 'POST' })
      .then(res => {
        if (res.ok) {
          const badge = document.getElementById('cart-count');
          badge.textContent = parseInt(badge.textContent) + 1;
          showToast('Added to cart — <a href="/cart" style="color:#fff;text-decoration:underline;">View Cart →</a>');
        } else {
          showToast('Could not add item');
        }
      })
      .catch(() => {
        const badge = document.getElementById('cart-count');
        badge.textContent = parseInt(badge.textContent) + 1;
        showToast('Added to cart');
      });
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerHTML = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  window.addEventListener('DOMContentLoaded', applyFilters);
</script>

</body>
</html>
