<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chroma — Sign In</title>
  <link rel="icon" href="/images/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  
  <link rel="stylesheet" th:href="@{/css/login.css}"/>
</head>
<body>

<!-- ── Left Panel (Form) ── -->
<div class="panel-left">
  <div class="form-header">
    <div class="form-eyebrow">Welcome back</div>
    <h1 class="form-title">Sign in to<br/>Chroma.</h1>
  </div>

  <!-- Alerts -->
  <div class="alert alert-error"   th:if="${error}"   th:text="${error}"></div>
  <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>

  <!--
    Spring Security intercepts POST /login.
    Field names MUST match: usernameParameter("email") and passwordParameter("password")
    in SecurityConfig.
  -->
  <form th:action="@{/login}" method="post" novalidate>
    <!-- CSRF token (Spring Security requires it) -->
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <!-- Email -->
    <div class="field">
      <label for="email">Email Address</label>
      <input
        type="email"
        id="email"
        name="email"
        placeholder="jane@example.com"
        autocomplete="email"
        required
      />
    </div>

    <!-- Password -->
    <div class="field">
      <label for="password">Password</label>
      <input
        type="password"
        id="password"
        name="password"
        placeholder="••••••••"
        autocomplete="current-password"
        required
      />
      <a href="#" class="forgot">Forgot password?</a>
    </div>

    <!-- Remember Me (sets the remember-me cookie) -->
    <div class="remember-row">
      <input type="checkbox" id="remember-me" name="remember-me"/>
      <label for="remember-me">Keep me signed in for 30 days</label>
    </div>

    <button type="submit" class="btn-submit"><span>Sign In →</span></button>
  </form>

  <div class="divider"><span>or</span></div>

  <div class="form-footer">
    Don't have an account? <a th:href="@{/register}">Create one</a>
  </div>
</div>

<!-- ── Right Panel (Dark) ── -->
<div class="panel-right">
  <div class="brand">
    <div class="brand-name">Chroma</div>
    <div class="brand-tag"></div>
  </div>

  <div class="panel-art">
    <div class="mosaic" id="mosaic"></div>
  </div>

  <div class="panel-quote">
    <p>"A computer is only as powerful as the mind behind it."</p>
    <span>— Bill Cunningham</span>
  </div>
</div>



<script th:src="@{/js/login.js}"></script>
</body>
</html>
