<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chroma — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:    #0e0e0e;
      --paper:  #f5f2ec;
      --accent: #0079b5;
      --muted:  #888070;
      --border: #d4cfc6;
      --field:  #ffffff;
    }

    body {
      min-height: 100vh;
      background-color: var(--paper);
      font-family: 'DM Mono', monospace;
      display: grid;
      grid-template-columns: 1fr 1fr;
      color: var(--ink);
      overflow: hidden;
    }

    /* ── Left panel (form side for login) ── */
    .panel-left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 4rem 5rem 4rem 4rem;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Right panel (dark) ── */
    .panel-right {
      position: relative;
      background: var(--ink);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 3rem;
      overflow: hidden;
    }

    .panel-right::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
              repeating-linear-gradient(
                      0deg,
                      transparent,
                      transparent 59px,
                      rgba(255,255,255,0.04) 59px,
                      rgba(255,255,255,0.04) 60px
              ),
              repeating-linear-gradient(
                      90deg,
                      transparent,
                      transparent 59px,
                      rgba(255,255,255,0.04) 59px,
                      rgba(255,255,255,0.04) 60px
              );
    }

    .brand {
      position: relative;
      z-index: 1;
      text-align: right;
    }

    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 300;
      color: #fff;
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }

    .brand-tag {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      margin-top: 0.4rem;
    }

    /* Animated art — diagonal stripes mosaic */
    .panel-art {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mosaic {
      display: grid;
      grid-template-columns: repeat(5, 44px);
      grid-template-rows: repeat(5, 44px);
      gap: 6px;
    }

    .tile {
      background: rgba(255,255,255,0.06);
      transition: background 0.4s;
      animation: pulse var(--dur, 3s) ease-in-out infinite var(--delay, 0s);
    }

    @keyframes pulse {
      0%, 100% { background: rgba(255,255,255,0.05); }
      50%       { background: rgba(0, 121, 181,var(--alpha, 0.5)); }
    }

    .panel-quote {
      position: relative;
      z-index: 1;
      text-align: right;
    }

    .panel-quote p {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 300;
      color: rgba(255,255,255,0.7);
      line-height: 1.6;
      font-style: italic;
    }

    .panel-quote span {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 0.75rem;
      letter-spacing: 0.15em;
    }

    /* ── Form ── */
    .form-header { margin-bottom: 2.5rem; }

    .form-eyebrow {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 0.6rem;
    }

    .form-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.8rem;
      font-weight: 400;
      line-height: 1.1;
      color: var(--ink);
    }

    /* Alerts */
    .alert {
      padding: 0.75rem 1rem;
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      margin-bottom: 1.5rem;
      border-left: 3px solid;
    }
    .alert-error   { background: #fdf0ef; color: var(--accent); border-color: var(--accent); }
    .alert-success { background: #eef7f0; color: #27ae60;       border-color: #27ae60; }

    /* Fields */
    .field { margin-bottom: 1.4rem; }

    label {
      display: block;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    input {
      width: 100%;
      padding: 0.8rem 1rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      color: var(--ink);
      background: var(--field);
      border: 1px solid var(--border);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--ink);
      box-shadow: 3px 3px 0 var(--ink);
    }

    input.is-invalid {
      border-color: var(--accent);
      box-shadow: 3px 3px 0 rgba(192,57,43,0.2);
    }

    .field-error {
      font-size: 0.65rem;
      color: var(--accent);
      margin-top: 0.35rem;
      letter-spacing: 0.05em;
    }

    .forgot {
      display: block;
      text-align: right;
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 0.4rem;
      text-decoration: none;
      letter-spacing: 0.05em;
    }
    .forgot:hover { color: var(--ink); }

    .btn-submit {
      width: 100%;
      padding: 0.9rem;
      margin-top: 0.5rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #fff;
      background: var(--ink);
      border: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s;
    }

    .btn-submit::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      transform: translateX(-100%);
      transition: transform 0.3s ease;
    }

    .btn-submit:hover::after { transform: translateX(0); }
    .btn-submit:hover { transform: translateY(-1px); }
    .btn-submit span { position: relative; z-index: 1; }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider span {
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .form-footer {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .form-footer a {
      color: var(--ink);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    @media (max-width: 768px) {
      body { grid-template-columns: 1fr; overflow: auto; }
      .panel-right { display: none; }
      .panel-left { padding: 3rem 2rem; }
    }
  </style>
</head>
<body>

<!-- ── Left Panel (Form) ── -->
<div class="panel-left">
  <div class="form-header">
    <div class="form-eyebrow">Welcome back</div>
    <h1 class="form-title">Sign in to<br/>Chroma.</h1>
  </div>

  <!-- Alerts -->
  <div class="alert alert-error"   th:if="${error}"   th:text="${error}"></div>
  <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>

  <form th:action="@{/login}" th:object="${loginDTO}" method="post" novalidate>

    <!-- Email -->
    <div class="field">
      <label for="email">Email Address</label>
      <input
              type="email"
              id="email"
              th:field="*{email}"
              th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
              placeholder="jane@example.com"
              autocomplete="email"
      />
      <div class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
    </div>

    <!-- Password -->
    <div class="field">
      <label for="password">Password</label>
      <input
              type="password"
              id="password"
              th:field="*{password}"
              th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
              placeholder="••••••••"
              autocomplete="current-password"
      />
      <div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
      <a href="#" class="forgot">Forgot password?</a>
    </div>

    <button type="submit" class="btn-submit"><span>Sign In →</span></button>
  </form>

  <div class="divider"><span>or</span></div>

  <div class="form-footer">
    Don't have an account? <a th:href="@{/register}">Create one</a>
  </div>
</div>

<!-- ── Right Panel (Dark) ── -->
<div class="panel-right">
  <div class="brand">
    <div class="brand-name">Chroma</div>
  </div>

  <div class="panel-art">
    <div class="mosaic" id="mosaic"></div>
  </div>

  <div class="panel-quote">
    <p>"A computer is only as powerful as the mind behind it."</p>
    <span>— Bill Cunningham</span>
  </div>
</div>

<script>
  // Generate mosaic tiles with random animation params
  const mosaic = document.getElementById('mosaic');
  for (let i = 0; i < 25; i++) {
    const tile = document.createElement('div');
    tile.className = 'tile';
    const dur   = (2 + Math.random() * 4).toFixed(1) + 's';
    const delay = (Math.random() * 3).toFixed(1) + 's';
    const alpha = (0.3 + Math.random() * 0.7).toFixed(2);
    tile.style.cssText = `--dur:${dur}; --delay:${delay}; --alpha:${alpha};`;
    mosaic.appendChild(tile);
  }
</script>

</body>
</html>
